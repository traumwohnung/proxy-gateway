# Proxy Rotator — Local Development Configuration
#
# Usage: cargo run
#
# Clients select a proxy set via Proxy-Authorization: Basic base64(set_name:)
# Optional session ID: base64(set_name-session_id:)
# No password is required.

bind_addr = "127.0.0.1:8100"
log_level = "info"

[[proxy_set]]
name = "residential"
proxies_file = "deployment/config/residential.txt"
session_affinity_secs = 300

[[proxy_set]]
name = "datacenter"
proxies_file = "deployment/config/datacenter.txt"
session_affinity_secs = 0
