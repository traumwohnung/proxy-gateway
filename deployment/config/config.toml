# Proxy Gateway — Production Configuration

bind_addr  = "0.0.0.0:8100"
admin_addr = "0.0.0.0:9000"
log_level  = "debug"

mitm_ca_cert = "mitm-ca.crt"
mitm_ca_key  = "mitm-ca.key"

[[proxy_set]]
name = "residential"
provider = "static_file"
[proxy_set.static_file]
proxies_file = "residential.txt"

[[proxy_set]]
name = "datacenter"
provider = "static_file"
[proxy_set.static_file]
proxies_file = "datacenter.txt"

[[proxy_set]]
name = "direct"
provider = "none"
