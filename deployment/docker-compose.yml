services:
  proxy-rotator:
    image: ghcr.io/1cedsoda/proxy-rotator:main
    # Or build locally:
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    ports:
      - "8100:8100"
    volumes:
      - ./config:/data/config:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
